<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FinFlow — Command Center</title>
<link rel="icon" type="image/png" href="assets/finflow-logo-gold.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg-0:#0a0a0d;--bg-1:#0f0f14;--bg-2:#15151b;--bg-3:#1b1b23;--side:#0c0c10;
  --gold:#d4af37;--gold-mid:#b8860b;--gold-deep:#8b6f00;--gold-lt:#f7e08a;
  --grad-gold:linear-gradient(150deg,#f7e08a 0%,#d4af37 48%,#9a7416 100%);
  --ink:#f6f4ed;--soft:#a4a199;--faint:#6c6a62;--dim:#4a4842;
  --line:rgba(255,255,255,0.07);--line-2:rgba(255,255,255,0.04);--line-gold:rgba(212,175,55,0.22);
  --pos:#62cf90;--pos-bg:rgba(98,207,144,0.12);--neg:#e0726a;--neg-bg:rgba(224,114,106,0.12);--warn:#e6b54f;--warn-bg:rgba(230,181,79,0.12);
  --glow:0 0 24px rgba(212,175,55,0.30);
  --ui:"Schibsted Grotesk",system-ui,sans-serif;--disp:"Cormorant Garamond",Georgia,serif;--mono:"JetBrains Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ui);color:var(--ink);background:var(--bg-0);font-size:14px;-webkit-font-smoothing:antialiased;}
::selection{background:rgba(212,175,55,0.25);}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#23232b;border-radius:6px}
#cursor-glow{position:fixed;top:0;left:0;width:460px;height:460px;margin:-230px 0 0 -230px;border-radius:50%;pointer-events:none;z-index:9997;opacity:0;transition:opacity .35s;background:radial-gradient(circle,rgba(212,175,55,.13),rgba(212,175,55,.05) 32%,transparent 60%);mix-blend-mode:screen;will-change:transform}
@media (hover:none){#cursor-glow{display:none}}
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh;}
.side{background:var(--side);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 18px;cursor:pointer;}
.brand .fmark{width:42px;height:auto;display:block;filter:drop-shadow(0 0 10px rgba(212,175,55,.5));}
.brand .wm{font-family:var(--disp);font-size:23px;font-weight:600;letter-spacing:.01em;}
.brand .wm .f{color:var(--gold);}
.ws{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--line);border-radius:11px;background:linear-gradient(160deg,var(--bg-2),var(--bg-1));margin-bottom:16px;cursor:pointer;}
.ws .mk{width:26px;height:26px;border-radius:7px;background:var(--grad-gold);display:grid;place-items:center;flex-shrink:0;font-weight:800;color:#1a1407;font-size:12px;box-shadow:var(--glow);}
.ws .nm{font-size:12.5px;font-weight:600;line-height:1.1;overflow:hidden}.ws .nm small{display:block;color:var(--faint);font-weight:400;font-size:10.5px;margin-top:1px;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;max-width:150px}
.ws .cx{margin-left:auto;color:var(--faint);}
.navg{font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);padding:14px 10px 6px;}
.ni{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:9px;color:var(--soft);font-size:13px;font-weight:500;cursor:pointer;position:relative;transition:.15s;text-decoration:none;}
.ni svg{width:17px;height:17px;stroke:var(--faint);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.ni:hover{background:rgba(255,255,255,0.03);color:var(--ink);}
.ni.on{background:rgba(212,175,55,0.09);color:var(--gold-lt);font-weight:600;}
.ni.on svg{stroke:var(--gold);}
.ni.on::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;border-radius:2px;background:var(--grad-gold);box-shadow:var(--glow);}
.ni .lk{margin-left:auto;font-size:10px;color:var(--gold);opacity:.8}
.spacer{flex:1;}
.me{display:flex;align-items:center;gap:10px;padding:9px 10px;border-top:1px solid var(--line);margin-top:8px;cursor:pointer;}
.me .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(150deg,#2a2a33,#17171d);border:1px solid var(--line-gold);display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--gold-lt);}
.me .nm{font-size:12.5px;font-weight:600;line-height:1.1;}.me .nm small{display:block;color:var(--faint);font-weight:400;font-size:10.5px;}
.main{display:flex;flex-direction:column;min-width:0;background:radial-gradient(900px 500px at 85% -8%,rgba(212,175,55,0.06),transparent 55%),var(--bg-0);}
.top{height:62px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 26px;gap:14px;position:sticky;top:0;background:rgba(10,10,13,0.82);backdrop-filter:blur(14px);z-index:20;}
.menub{display:none;width:36px;height:36px;border:1px solid var(--line);border-radius:10px;background:var(--bg-1);place-items:center;cursor:pointer}
.menub svg{width:18px;height:18px;stroke:var(--soft);fill:none;stroke-width:1.8}
.crumb{font-size:13px;color:var(--faint);}.crumb b{color:var(--ink);font-weight:600;}
.grow{flex:1;}
.ic-btn{width:36px;height:36px;border:1px solid var(--line);border-radius:10px;background:var(--bg-1);display:grid;place-items:center;cursor:pointer;position:relative;}
.ic-btn svg{width:17px;height:17px;stroke:var(--soft);fill:none;stroke-width:1.7;}
.content{padding:30px 36px 60px;max-width:1240px;width:100%;}
.phead{display:flex;align-items:flex-end;gap:16px;margin-bottom:26px;flex-wrap:wrap;}
.phead .pt{font-family:var(--disp);font-size:38px;font-weight:600;letter-spacing:.01em;line-height:1;}
.phead .ps{font-size:13.5px;color:var(--soft);margin-top:7px;}
.phead .acts{margin-left:auto;display:flex;gap:10px;align-items:center;}
.btn{height:40px;padding:0 18px;border-radius:11px;font-family:var(--ui);font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--bg-2);color:var(--ink);cursor:pointer;transition:.16s;}
.btn:hover{border-color:var(--line-gold)}
.btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;}
.btn.pri{background:var(--grad-gold);color:#1a1407;border:none;box-shadow:var(--glow);font-weight:700;}
.card{background:linear-gradient(165deg,rgba(26,26,33,0.72),rgba(16,16,21,0.66));backdrop-filter:blur(10px) saturate(125%);-webkit-backdrop-filter:blur(10px) saturate(125%);border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 40px -22px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,255,255,0.05);}
.card-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;}
.card-h h3{font-size:15px;font-weight:700;letter-spacing:-0.01em;}
.card-h .hint{font-size:11.5px;color:var(--faint);margin-left:auto;}
.card-h .lg{display:flex;gap:16px;margin-left:auto;}
.card-h .lg span{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--soft);}
.card-h .lg i{width:18px;height:3px;border-radius:2px;display:inline-block;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px;}
.kpi{padding:18px 19px;}
.kpi .ktop{display:flex;align-items:center;gap:11px;margin-bottom:16px;}
.kpi .ico{width:38px;height:38px;border-radius:11px;background:rgba(212,175,55,0.10);border:1px solid var(--line-gold);display:grid;place-items:center;}
.kpi .ico svg{width:19px;height:19px;stroke:var(--gold-lt);fill:none;stroke-width:1.7;}
.kpi .lab{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);}
.kpi .val{font-family:var(--disp);font-size:30px;font-weight:600;color:#fff;line-height:1;letter-spacing:.01em;}
.kpi .chg{font-size:11.5px;font-weight:600;margin-top:11px;display:flex;align-items:center;gap:6px;}
.kpi .chg.up{color:var(--pos);}.kpi .chg.dn{color:var(--neg);}
.kpi .chg .since{color:var(--faint);font-weight:400;}
.kpis .kpi{animation:rise .5s cubic-bezier(.2,.8,.2,1) both}
.kpis .kpi:nth-child(2){animation-delay:.07s}.kpis .kpi:nth-child(3){animation-delay:.14s}.kpis .kpi:nth-child(4){animation-delay:.21s}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.ld{stroke-dasharray:2200;stroke-dashoffset:2200;animation:draw 1.5s ease .25s forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.af{opacity:0;animation:cfade 1.1s ease .7s forwards}
@keyframes cfade{to{opacity:1}}
.grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:16px;}
.chart-wrap{padding:18px 20px 8px;}
.donut-wrap{padding:20px;display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.legend{flex:1;display:flex;flex-direction:column;gap:13px;min-width:140px}
.lr{display:flex;align-items:center;gap:10px;font-size:13px;}
.lr .sw{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.lr .nm{color:var(--soft);flex:1;}.lr .vl{font-family:var(--mono);color:#fff;font-size:12.5px;}
.orow{display:flex;align-items:center;gap:13px;padding:12px 20px;border-bottom:1px solid var(--line-2);}
.orow:last-child{border-bottom:none;}
.orow .oi{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;border:1px solid var(--line-gold);}
.orow .oi.inc{background:var(--pos-bg);}.orow .oi.exp{background:var(--neg-bg);}
.orow .oi svg{width:16px;height:16px;fill:none;stroke-width:1.9;}
.orow .oi.inc svg{stroke:var(--pos)}.orow .oi.exp svg{stroke:var(--neg)}
.orow .ot{font-size:13.5px;font-weight:600;color:var(--ink);}.orow .od{font-size:11.5px;color:var(--faint);margin-top:1px;}
.orow .amt{font-family:var(--mono);font-size:13px;color:#fff;margin-left:auto;}
.orow .amt.inc{color:var(--pos)}.orow .amt.exp{color:var(--neg)}
.pill{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.pill.neg{color:var(--neg);background:var(--neg-bg);}.pill.warn{color:var(--warn);background:var(--warn-bg);}.pill.pos{color:var(--pos);background:var(--pos-bg);}
.empty{padding:46px 20px;text-align:center;color:var(--faint);font-size:13px}
.footrow{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--line);}
.footrow a{font-size:12px;color:var(--gold-lt);text-decoration:none;font-weight:600;cursor:pointer}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;color:var(--faint);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:12px 20px;border-bottom:1px solid var(--line)}
.tbl td{padding:12px 20px;border-bottom:1px solid var(--line-2);color:var(--soft)}
.tbl td .m{color:var(--ink);font-weight:600}
.tbl tr:last-child td{border-bottom:none}
.soon{padding:60px 20px;text-align:center}
.soon .ic{width:60px;height:60px;border-radius:16px;background:rgba(212,175,55,0.08);border:1px solid var(--line-gold);display:grid;place-items:center;margin:0 auto 18px}
.soon .ic svg{width:28px;height:28px;stroke:var(--gold-lt);fill:none;stroke-width:1.6}
.soon h3{font-family:var(--disp);font-size:26px;font-weight:600;margin-bottom:8px}
.soon p{color:var(--soft);font-size:13.5px;max-width:380px;margin:0 auto}
.ov{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(800px 500px at 80% -10%,rgba(212,175,55,.10),transparent 60%),rgba(6,6,9,.78);backdrop-filter:blur(12px);animation:fade .25s}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.mcard{width:min(420px,94vw);background:linear-gradient(165deg,rgba(26,26,33,0.82),rgba(15,15,20,0.86));backdrop-filter:blur(22px) saturate(135%);-webkit-backdrop-filter:blur(22px) saturate(135%);border:1px solid var(--line-gold);border-radius:20px;padding:28px;position:relative;box-shadow:0 40px 90px -30px #000,inset 0 1px 0 rgba(255,255,255,0.06);animation:pop .3s cubic-bezier(.2,.8,.2,1);max-height:92vh;overflow-y:auto}
.mbrand{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.mbrand .fmark{width:27px;height:auto;display:block;filter:drop-shadow(0 0 9px rgba(212,175,55,.45))}
.mbrand .wm{font-family:var(--disp);font-size:20px;font-weight:600}.mbrand .wm .f{color:var(--gold)}
.mbrand .tg{font-size:9px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.mh{font-family:var(--disp);font-size:26px;font-weight:600;margin-bottom:4px}
.msub{color:var(--soft);font-size:13px;margin-bottom:18px;line-height:1.5}
.fld{display:block;margin:10px 0}
.fld label{display:block;font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;font-weight:600}
.inp{width:100%;padding:12px 14px;border-radius:11px;font-size:14px;color:#fff;background:var(--bg-0);border:1px solid var(--line);font-family:inherit;outline:none;transition:.15s}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.14)}
select.inp{appearance:none}
.mbtn{width:100%;padding:13px;border:0;border-radius:11px;font-weight:700;font-size:14px;cursor:pointer;margin-top:10px;font-family:inherit;transition:.1s}
.mbtn:active{transform:scale(.99)}.mbtn[disabled]{opacity:.6;cursor:not-allowed}
.mbtn.pri{background:var(--grad-gold);color:#1a1407;box-shadow:var(--glow)}
.mbtn.ghost{background:rgba(255,255,255,.04);color:var(--ink);border:1px solid var(--line)}
.mbtn.g{background:#fff;color:#1f2430;display:flex;align-items:center;justify-content:center;gap:9px}
.mor{display:flex;align-items:center;gap:12px;color:var(--faint);font-size:11.5px;margin:14px 0 2px}.mor::before,.mor::after{content:"";flex:1;height:1px;background:var(--line)}
.mfoot{text-align:center;color:var(--soft);font-size:13px;margin-top:15px}.mlink{color:var(--gold-lt);cursor:pointer;font-weight:600}
.mmsg{font-size:12.5px;min-height:16px;margin-top:8px}.mmsg.err{color:var(--neg)}.mmsg.ok{color:var(--pos)}
.mx{position:absolute;top:16px;right:18px;color:var(--faint);cursor:pointer;font-size:22px;background:none;border:0;line-height:1}.mx:hover{color:var(--ink)}
.seg2{display:flex;gap:8px;margin:4px 0 6px}
.seg2 button{flex:1;padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--bg-0);color:var(--soft);font-family:inherit;font-weight:600;cursor:pointer;font-size:13px}
.seg2 button.on.inc{background:var(--pos-bg);color:var(--pos);border-color:var(--pos)}
.seg2 button.on.exp{background:var(--neg-bg);color:var(--neg);border-color:var(--neg)}
.va{font-family:var(--mono);font-size:25px;font-weight:600;letter-spacing:1px;color:var(--gold-lt);text-align:center;margin:12px 0;user-select:all}
.spin{width:34px;height:34px;border:3px solid rgba(212,175,55,.25);border-top-color:var(--gold);border-radius:50%;margin:18px auto;animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.plan{border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-top:11px}
.plan.feat{border:1.5px solid var(--line-gold);background:linear-gradient(160deg,rgba(212,175,55,.07),transparent)}
.plan h4{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.plan .pr{font-family:var(--disp);font-size:24px;color:var(--gold-lt);margin:5px 0}.plan .pr small{font-size:13px;color:var(--faint);font-family:var(--ui)}
.plan ul{list-style:none;margin:6px 0 0;color:var(--soft);font-size:12px;line-height:1.55}.plan li::before{content:"✓ ";color:var(--gold)}
.tag{font-size:10px;font-weight:700;color:#1a1407;background:var(--grad-gold);padding:3px 8px;border-radius:20px}
#splash{position:fixed;inset:0;background:radial-gradient(700px 520px at 50% 42%,rgba(46,86,164,.14),transparent 70%),var(--bg-0);display:grid;place-items:center;z-index:9999;transition:opacity .5s}
.splash-logo{position:relative;display:flex;flex-direction:column;align-items:center;gap:16px}
.splash-logo .halo{position:absolute;top:-46px;left:50%;transform:translateX(-50%);width:270px;height:270px;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,.22),rgba(212,175,55,.06) 46%,transparent 68%);pointer-events:none;z-index:0;animation:halo 2.6s ease-in-out infinite}
.splash-logo .halo::before{content:"";position:absolute;inset:26px;border-radius:50%;border:1px solid rgba(212,175,55,.28);box-shadow:0 0 50px rgba(212,175,55,.22) inset,0 0 34px rgba(212,175,55,.18);animation:spin 9s linear infinite}
.splash-logo .halo::after{content:"";position:absolute;inset:58px;border-radius:50%;border:1px dashed rgba(247,224,138,.22);animation:spin 14s linear infinite reverse}
@keyframes halo{0%,100%{opacity:.75;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.05)}}
@keyframes spin{to{transform:rotate(360deg)}}
.splash-logo .flash{position:absolute;top:-90px;left:50%;transform:translateX(-50%);width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.55),rgba(212,175,55,.2) 38%,transparent 64%);opacity:0;pointer-events:none;animation:scrFlash 2.6s linear 1s infinite;mix-blend-mode:screen;z-index:2}
.splash-logo .lockup{display:flex;align-items:center;gap:20px;position:relative;z-index:1}
.fmark.big{position:relative;z-index:1;width:132px;height:auto;transform-origin:center;opacity:0;filter:drop-shadow(0 0 22px rgba(212,175,55,.45));animation:bob 2.6s ease-in-out infinite,lflash 2.6s linear 1s infinite,logoIn 1s ease both}
@keyframes logoIn{0%{opacity:0}100%{opacity:1}}
.flogo{position:relative;z-index:1;width:132px;height:165px;animation:bob 2.6s ease-in-out infinite}
.flogo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0}
.f-bot{clip-path:inset(47% 0 0 0);animation:reveal2 .6s ease 1s forwards}
.f-top{clip-path:inset(0 0 50% 0);animation:reveal2 .6s ease 2.3s forwards}
@keyframes reveal2{0%{opacity:0;filter:drop-shadow(0 0 4px #d4af37)}35%{opacity:1;filter:drop-shadow(0 0 46px #fff) brightness(1.9)}100%{opacity:1;filter:drop-shadow(0 0 18px rgba(212,175,55,.5)) brightness(1)}}
.splash-wm{font-family:var(--disp);font-size:48px;font-weight:600;letter-spacing:.01em;color:var(--ink);z-index:1;line-height:1}
.splash-wm span{color:var(--gold)}
.splash-tg{font-size:10.5px;color:var(--faint);letter-spacing:.18em;text-transform:uppercase;margin-top:-8px;z-index:1}
.splash-logo.zoom{animation:venomZoom 5.6s ease-in forwards}
@keyframes venomZoom{0%{transform:scale(1)}100%{transform:scale(1.5)}}
.splash-logo.zoom .halo{animation:halo 2.6s ease-in-out infinite,haloBoost 2.2s ease forwards}
@keyframes haloBoost{to{filter:brightness(1.5) saturate(1.3)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes lflash{0%,17%,46%,100%{filter:drop-shadow(0 0 22px rgba(212,175,55,.45)) brightness(1)}2%{filter:drop-shadow(0 0 60px #fff) drop-shadow(0 0 26px #f7e08a) brightness(1.7)}7%{filter:drop-shadow(0 0 26px rgba(212,175,55,.6)) brightness(1.12)}48%{filter:drop-shadow(0 0 60px #fff) drop-shadow(0 0 26px #f7e08a) brightness(1.6)}53%{filter:drop-shadow(0 0 26px rgba(212,175,55,.6)) brightness(1.12)}}
@keyframes scrFlash{0%,16%,46%,100%{opacity:0}2%{opacity:.9}6%{opacity:.1}48%{opacity:.8}52%{opacity:.1}}
.bolts{position:absolute;top:-72px;left:50%;transform:translateX(-50%);width:300px;height:300px;overflow:visible;pointer-events:none;z-index:1}
.bolt{fill:none;stroke:#eaf4ff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 3px #fff) drop-shadow(0 0 8px #7cc0ff) drop-shadow(0 0 16px #2e74ff);opacity:0;stroke-dasharray:760;stroke-dashoffset:760}
.bolt.glow{stroke:#9ccbff;stroke-width:8;opacity:0;filter:blur(3.5px) drop-shadow(0 0 14px #2e74ff)}
.bolt.s1,.bolt.s1b{animation:strike 2.6s linear 1s infinite}
.bolt.s1.glow,.bolt.s1b.glow{animation:strikeG 2.6s linear 1s infinite}
.bolt.s2,.bolt.s2b{animation:strike 2.6s linear 2.3s infinite}
.bolt.s2.glow,.bolt.s2b.glow{animation:strikeG 2.6s linear 2.3s infinite}
@keyframes strike{0%{opacity:0;stroke-dashoffset:640}1.5%{opacity:1;stroke-dashoffset:0}5%{opacity:.2}7%{opacity:.95}12%{opacity:0;stroke-dashoffset:0}100%{opacity:0}}
@keyframes strikeG{0%{opacity:0}2%{opacity:.7}7%{opacity:.15}10%{opacity:.5}13%{opacity:0}100%{opacity:0}}
@media (max-width:1080px){.app{grid-template-columns:1fr}.side{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%);transition:.25s;width:248px}.side.open{transform:none}.menub{display:grid}.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.content{padding:22px 18px 60px}.phead .pt{font-size:30px}}
</style>
</head>
